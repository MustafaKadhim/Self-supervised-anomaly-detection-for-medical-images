<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="900" height="320" rx="16" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#58a6ff">Self-Supervised Anomaly Detection Framework</text>

  <!-- INPUT IMAGE -->
  <rect x="30" y="80" width="120" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="110" text-anchor="middle" font-size="12" fill="#8b949e">Input Image</text>
  <!-- Simulated MRI slice -->
  <ellipse cx="90" cy="175" rx="42" ry="52" fill="#1f6feb" opacity="0.25"/>
  <ellipse cx="90" cy="175" rx="28" ry="36" fill="#388bfd" opacity="0.3"/>
  <ellipse cx="90" cy="165" rx="16" ry="18" fill="#58a6ff" opacity="0.4"/>
  <text x="90" y="225" text-anchor="middle" font-size="10" fill="#6e7681">MRI Slice</text>

  <!-- Arrow: Input -> Encoder -->
  <line x1="150" y1="160" x2="200" y2="160" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ENCODER -->
  <rect x="200" y="80" width="140" height="160" rx="10" fill="#161b22" stroke="#1f6feb" stroke-width="2"/>
  <text x="270" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#58a6ff">Encoder</text>
  <text x="270" y="126" text-anchor="middle" font-size="10" fill="#8b949e">Residual Blocks</text>
  <rect x="220" y="136" width="100" height="16" rx="4" fill="#1f6feb" opacity="0.4"/>
  <text x="270" y="149" text-anchor="middle" font-size="9" fill="#c9d1d9">Conv 32→64</text>
  <rect x="220" y="158" width="100" height="16" rx="4" fill="#1f6feb" opacity="0.5"/>
  <text x="270" y="171" text-anchor="middle" font-size="9" fill="#c9d1d9">Conv 64→128</text>
  <rect x="220" y="180" width="100" height="16" rx="4" fill="#1f6feb" opacity="0.6"/>
  <text x="270" y="193" text-anchor="middle" font-size="9" fill="#c9d1d9">Conv 128→256</text>
  <rect x="220" y="202" width="100" height="16" rx="4" fill="#1f6feb" opacity="0.7"/>
  <text x="270" y="215" text-anchor="middle" font-size="9" fill="#c9d1d9">AdaptiveAvgPool</text>
  <text x="270" y="232" text-anchor="middle" font-size="10" fill="#8b949e">Skip Features</text>

  <!-- Arrow: Encoder -> Latent -->
  <line x1="340" y1="160" x2="390" y2="160" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- LATENT SPACE -->
  <rect x="390" y="110" width="120" height="100" rx="10" fill="#161b22" stroke="#3fb950" stroke-width="2"/>
  <text x="450" y="134" text-anchor="middle" font-size="13" font-weight="bold" fill="#3fb950">Latent z</text>
  <text x="450" y="152" text-anchor="middle" font-size="10" fill="#8b949e">dim = 256/512</text>
  <ellipse cx="450" cy="178" rx="38" ry="16" fill="#238636" opacity="0.35"/>
  <text x="450" y="183" text-anchor="middle" font-size="9" fill="#3fb950">Bottleneck</text>
  <text x="450" y="200" text-anchor="middle" font-size="9" fill="#8b949e">Compact</text>

  <!-- Arrow: Latent -> Decoder -->
  <line x1="510" y1="160" x2="560" y2="160" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- DECODER -->
  <rect x="560" y="80" width="140" height="160" rx="10" fill="#161b22" stroke="#f78166" stroke-width="2"/>
  <text x="630" y="106" text-anchor="middle" font-size="13" font-weight="bold" fill="#f78166">Decoder</text>
  <text x="630" y="126" text-anchor="middle" font-size="10" fill="#8b949e">UpBlocks + Skip</text>
  <rect x="580" y="136" width="100" height="16" rx="4" fill="#da3633" opacity="0.5"/>
  <text x="630" y="149" text-anchor="middle" font-size="9" fill="#c9d1d9">Up 256→128</text>
  <rect x="580" y="158" width="100" height="16" rx="4" fill="#da3633" opacity="0.55"/>
  <text x="630" y="171" text-anchor="middle" font-size="9" fill="#c9d1d9">Up 128→64</text>
  <rect x="580" y="180" width="100" height="16" rx="4" fill="#da3633" opacity="0.6"/>
  <text x="630" y="193" text-anchor="middle" font-size="9" fill="#c9d1d9">Up 64→32</text>
  <rect x="580" y="202" width="100" height="16" rx="4" fill="#da3633" opacity="0.65"/>
  <text x="630" y="215" text-anchor="middle" font-size="9" fill="#c9d1d9">Conv + Sigmoid</text>

  <!-- Skip connection arc -->
  <path d="M270 240 Q450 290 630 240" stroke="#e3b341" stroke-width="1.5" fill="none" stroke-dasharray="5,3"/>
  <text x="450" y="282" text-anchor="middle" font-size="10" fill="#e3b341">Skip Connections</text>

  <!-- Arrow: Decoder -> Output -->
  <line x1="700" y1="160" x2="750" y2="160" stroke="#30363d" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- RECONSTRUCTION -->
  <rect x="750" y="80" width="120" height="160" rx="10" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="810" y="110" text-anchor="middle" font-size="11" fill="#8b949e">Reconstruction</text>
  <ellipse cx="810" cy="175" rx="42" ry="52" fill="#1f6feb" opacity="0.2"/>
  <ellipse cx="810" cy="175" rx="28" ry="36" fill="#388bfd" opacity="0.25"/>
  <ellipse cx="810" cy="165" rx="16" ry="18" fill="#58a6ff" opacity="0.35"/>
  <!-- Anomaly highlight -->
  <ellipse cx="826" cy="155" rx="8" ry="7" fill="#f85149" opacity="0.7"/>
  <text x="810" y="225" text-anchor="middle" font-size="10" fill="#f85149">Anomaly Map</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b949e"/>
    </marker>
  </defs>

  <!-- Loss label at bottom -->
  <text x="450" y="308" text-anchor="middle" font-size="11" fill="#8b949e">Loss = L1(x, x̂) + SSIM(x, x̂) + Perceptual(x, x̂)</text>
</svg>
