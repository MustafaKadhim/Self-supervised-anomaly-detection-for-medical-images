<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200" font-family="'Segoe UI', Arial, sans-serif">
  <!-- Background -->
  <rect width="600" height="200" rx="18" fill="#0d1117"/>

  <!-- Left: Brain icon (stylised) -->
  <g transform="translate(60, 100)">
    <!-- Brain outline left hemisphere -->
    <path d="M0,-55 C-30,-55 -55,-35 -55,-5 C-55,15 -42,30 -25,38 C-20,45 -12,52 0,52 Z"
          fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Brain outline right hemisphere -->
    <path d="M0,-55 C30,-55 55,-35 55,-5 C55,15 42,30 25,38 C20,45 12,52 0,52 Z"
          fill="none" stroke="#58a6ff" stroke-width="2.5" opacity="0.9"/>
    <!-- Inner folds left -->
    <path d="M-5,-30 C-20,-20 -30,-5 -20,10" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
    <path d="M-8,10 C-25,18 -28,30 -15,38" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
    <!-- Inner folds right -->
    <path d="M5,-30 C20,-20 30,-5 20,10" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
    <path d="M8,10 C25,18 28,30 15,38" fill="none" stroke="#388bfd" stroke-width="1.5" opacity="0.7"/>
    <!-- Anomaly glow -->
    <circle cx="32" cy="-12" r="10" fill="#f85149" opacity="0.25"/>
    <circle cx="32" cy="-12" r="6" fill="#f85149" opacity="0.5"/>
    <circle cx="32" cy="-12" r="3" fill="#ff6b6b" opacity="0.9"/>
  </g>

  <!-- Title text -->
  <text x="135" y="78" font-size="22" font-weight="bold" fill="#c9d1d9">Anomaly</text>
  <text x="135" y="108" font-size="22" font-weight="bold" fill="#58a6ff">Detection</text>
  <text x="135" y="138" font-size="14" fill="#8b949e">Self-Supervised · Medical Images</text>

  <!-- Right: Pipeline mini-diagram -->
  <g transform="translate(400, 100)">
    <!-- Input box -->
    <rect x="-85" y="-30" width="50" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <ellipse cx="-60" cy="0" rx="16" ry="22" fill="#1f6feb" opacity="0.3"/>
    <ellipse cx="-60" cy="0" rx="10" ry="14" fill="#388bfd" opacity="0.4"/>

    <!-- Arrow -->
    <line x1="-34" y1="0" x2="-15" y2="0" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

    <!-- Latent circle -->
    <circle cx="0" cy="0" r="18" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" font-size="9" fill="#3fb950">z</text>

    <!-- Arrow -->
    <line x1="18" y1="0" x2="37" y2="0" stroke="#8b949e" stroke-width="1.5" marker-end="url(#a)"/>

    <!-- Output box -->
    <rect x="38" y="-30" width="50" height="60" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <ellipse cx="63" cy="0" rx="16" ry="22" fill="#1f6feb" opacity="0.25"/>
    <ellipse cx="63" cy="0" rx="10" ry="14" fill="#388bfd" opacity="0.3"/>
    <!-- Anomaly dot -->
    <circle cx="73" cy="-8" r="5" fill="#f85149" opacity="0.8"/>

    <!-- Labels -->
    <text x="-60" y="38" text-anchor="middle" font-size="9" fill="#8b949e">Input</text>
    <text x="63" y="38" text-anchor="middle" font-size="9" fill="#f85149">Anomaly</text>
  </g>

  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#8b949e"/>
    </marker>
  </defs>
</svg>
